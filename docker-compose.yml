version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - shopbot-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopbot-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - shopbot-net

  # Uncomment for Postgres in prod
  # db:
  #   image: postgres:16-alpine
  #   container_name: shopbot-db
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: shopbot
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - shopbot-net

networks:
  shopbot-net:
    driver: bridge

volumes:
  chroma_data:
  # pg_data: